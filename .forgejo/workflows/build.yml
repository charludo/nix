name: Build all flake outputs
run-name: ${{ forgejo.actor }} is building all flake outputs (this may take a while)
on: [push]
permissions:
  contents: read
jobs:
  build-outputs:
    runs-on: buildbot
    steps:
      - name: Check out repository code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: true
          token: ${{ secrets.PAT }}
          persist-credentials: false
      - name: Build all flake outputs
        run: nix build .?submodules=1#ci-builds
